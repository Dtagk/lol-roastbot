services:
  ollama:
    image: ollama/ollama
    container_name: ollama-roastbot
    ports:
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  roastbot:
    build: .
    container_name: roastbot
    env_file: .env
    environment:
      OLLAMA_URL: http://ollama:11434
      # lcu_proxy.py runs on the host and forwards LCU requests from the
      # container to 127.0.0.1 (LCU only listens on loopback).
      LCU_PROXY_URL: http://host.docker.internal:58888
      LCU_PROXY_SECRET: ${LCU_PROXY_SECRET:-}
    volumes:
      - "./seen.json:/app/seen.json"
      - "./streaks.json:/app/streaks.json"
      - "./history.json:/app/history.json"
      - "./queue.json:/app/queue.json"
      - "./roast_lines.json:/app/roast_lines.json"
      - "./crew.json:/app/crew.json:ro"
    depends_on:
      - ollama
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ollama_models:
