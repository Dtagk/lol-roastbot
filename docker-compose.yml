services:
  ollama:
    image: ollama/ollama
    container_name: ollama-roastbot
    ports:
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  roastbot:
    build: .
    container_name: roastbot
    env_file: .env
    environment:
      LCU_HOST: host.docker.internal
      OLLAMA_URL: http://ollama:11434
      LCU_LOCKFILE: /lockfile
    volumes:
      - "C:/Riot Games/League of Legends/lockfile:/lockfile:ro"
      - "./seen.json:/app/seen.json"
      - "./streaks.json:/app/streaks.json"
      - "./history.json:/app/history.json"
      - "./queue.json:/app/queue.json"
      - "./roast_lines.json:/app/roast_lines.json"
      - "./crew.json:/app/crew.json:ro"
    depends_on:
      - ollama
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ollama_models:
