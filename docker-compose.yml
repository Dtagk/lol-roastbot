services:
  ollama:
    image: ollama/ollama
    container_name: ollama-roastbot
    ports:
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  roastbot:
    build: .
    container_name: roastbot
    env_file: .env
    environment:
      LCU_HOST: host.docker.internal
      OLLAMA_URL: http://ollama:11434
      # Inside the container the Riot parent dir is mounted at /riot. The bot
      # finds the lockfile under it (default: /riot/League of Legends/lockfile)
      # and falls back to searching /riot if a patch relocated the install.
      LCU_MOUNT_ROOT: /riot
    volumes:
      # Mount the Riot PARENT directory, not the League leaf folder — the
      # parent is stable across patches that relocate the game install.
      # Override the host path with LEAGUE_PARENT_DIR in .env if needed.
      - "${LEAGUE_PARENT_DIR:-C:/Riot Games}:/riot:ro"
      - "./seen.json:/app/seen.json"
      - "./streaks.json:/app/streaks.json"
      - "./history.json:/app/history.json"
      - "./queue.json:/app/queue.json"
      - "./roast_lines.json:/app/roast_lines.json"
      - "./crew.json:/app/crew.json:ro"
    depends_on:
      - ollama
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ollama_models:
